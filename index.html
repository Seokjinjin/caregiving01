<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>요양보호사 기출 퀴즈 | 복습왕</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f5f4f0;min-height:100vh;padding:1.25rem 1rem}
#app{width:100%;max-width:480px;margin:0 auto}
.screen{display:none}
.screen.active{display:block}

.start-card{background:#fff;border-radius:16px;padding:2rem 1.5rem;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.start-icon{font-size:48px;margin-bottom:1rem}
.start-title{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:.5rem}
.start-sub{font-size:15px;color:#666;line-height:1.6;margin-bottom:.25rem}
.start-badge{display:inline-block;margin:1rem 0 1.5rem;padding:.35rem .9rem;background:#fff3f3;color:#c0392b;border-radius:20px;font-size:13px;font-weight:600}
.btn-primary{width:100%;padding:.9rem;background:#c0392b;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer}
.btn-primary:active{background:#a93226}

.quiz-header{margin-bottom:1rem}
.progress-bar{height:6px;background:#e8e5e0;border-radius:3px;margin-bottom:.75rem}
.progress-fill{height:100%;background:#c0392b;border-radius:3px;transition:width .3s}
.q-meta{display:flex;justify-content:space-between}
.q-counter{font-size:13px;color:#888;font-weight:500}
.q-score{font-size:13px;color:#c0392b;font-weight:700}

.q-card{background:#fff;border-radius:16px;padding:1.25rem;margin-bottom:.75rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.q-text{font-size:16px;font-weight:500;color:#1a1a1a;line-height:1.75;white-space:pre-line}

.options{display:flex;flex-direction:column;gap:.55rem;margin-bottom:.75rem}
.opt{display:flex;align-items:flex-start;gap:.75rem;padding:.9rem 1rem;background:#fff;border:2px solid #e5e2dd;border-radius:12px;cursor:pointer;text-align:left;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.opt:active{background:#fff0ef;border-color:#c0392b}
.opt-num{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:#f5f4f0;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#666}
.opt-text{font-size:15px;color:#222;line-height:1.55;padding-top:4px}

.opt.correct{background:#eafaf1;border-color:#27ae60}
.opt.correct .opt-num{background:#27ae60;border-color:#27ae60;color:#fff}
.opt.wrong{background:#fff5f5;border-color:#e74c3c}
.opt.wrong .opt-num{background:#e74c3c;border-color:#e74c3c;color:#fff}
.opt.disabled{pointer-events:none}
.opt.dim{opacity:.35}

.feedback{padding:.85rem 1rem;border-radius:12px;margin-bottom:.75rem;font-size:14px;line-height:1.65;display:none}
.feedback.show{display:block}
.feedback.ok{background:#eafaf1;color:#1a7a3e;border:1.5px solid #a9dfbf}
.feedback.bad{background:#fdedec;color:#b03a2e;border:1.5px solid #f5b7b1}

.btn-next{width:100%;padding:.9rem;background:#c0392b;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;display:none;touch-action:manipulation}
.btn-next.show{display:block}
.btn-next:active{background:#a93226}

.result-card{background:#fff;border-radius:16px;padding:2rem 1.5rem;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:1rem}
.result-emoji{font-size:44px;margin-bottom:.75rem}
.score-row{display:flex;align-items:baseline;justify-content:center;gap:.25rem;margin-bottom:.4rem}
.score-big{font-size:54px;font-weight:700;color:#c0392b}
.score-denom{font-size:20px;color:#888;font-weight:500}
.score-pct{font-size:15px;color:#aaa;margin-bottom:.85rem}
.score-msg{font-size:15px;color:#555;line-height:1.65}
.wrong-summary{background:#fff5f5;border:1.5px solid #f5b7b1;border-radius:12px;padding:.85rem 1rem;margin-bottom:1rem;font-size:14px;color:#b03a2e;line-height:1.75}
.result-actions{display:flex;flex-direction:column;gap:.6rem}
.btn-sec{width:100%;padding:.9rem;background:#fff;color:#333;border:2px solid #ddd;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;touch-action:manipulation}
.btn-sec:active{background:#f5f4f0}
.yt-btn{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;padding:.9rem;background:#ff0000;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;touch-action:manipulation}
.yt-btn:active{background:#cc0000}
</style>
</head>
<body>
<div id="app">

  <div id="start" class="screen active">
    <div class="start-card">
      <div class="start-icon">📋</div>
      <div class="start-title">요양보호사 기출 퀴즈</div>
      <div class="start-sub">선택지를 눌러 정답을 맞혀보세요</div>
      <div class="start-badge">총 13문제 · 노인복지 기초</div>
      <button class="btn-primary" id="startBtn">퀴즈 시작하기</button>
    </div>
  </div>

  <div id="quiz" class="screen">
    <div class="quiz-header">
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
      <div class="q-meta">
        <span class="q-counter" id="counter"></span>
        <span class="q-score" id="liveScore"></span>
      </div>
    </div>
    <div class="q-card"><div class="q-text" id="qtext"></div></div>
    <div class="options" id="opts"></div>
    <div class="feedback" id="fb"></div>
    <button class="btn-next" id="nextbtn">다음 문제 →</button>
  </div>

  <div id="result" class="screen">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="score-row">
        <span class="score-big" id="scoreNum"></span>
        <span class="score-denom" id="scoreDenom"></span>
      </div>
      <div class="score-pct" id="scorePct"></div>
      <div class="score-msg" id="scoreMsg"></div>
    </div>
    <div id="wrongSummary"></div>
    <div class="result-actions">
      <button class="btn-sec" id="retryWrong" style="display:none">틀린 문제만 다시 풀기</button>
      <button class="btn-sec" id="restartBtn">처음부터 다시 풀기</button>
      <a class="yt-btn" href="https://www.youtube.com/@복습왕" target="_blank">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
        복습왕 유튜브 채널 바로가기
      </a>
    </div>
  </div>

</div>
<script>
var ALL_QS=[
  {q:"다음 사례에서 국가가 노인에게 제공하는 보상의 유형으로 옳은 것은?\n\n매년 어버이날과 노인의 날을 기념하여 사회에 귀감이 되는 어르신을 선발해 표창하고 있다.",opts:["경제적 보상","제도적 보상","정치적 보상","정신적 보상","문화적 보상"],ans:2},
  {q:"노년기에 건강한 생활을 유지하기 위한 방법으로 올바른 것은?",opts:["배우자와의 관계에서 수평성보다 위계를 강조한다.","지역사회 봉사활동에 적극적으로 참여한다.","중요한 결정을 자녀에게 맡기며 의존적으로 생활한다.","나이가 들수록 인간관계의 범위를 좁혀간다.","만성질환이 생기면 노화의 당연한 과정으로 여기고 방치한다."],ans:1},
  {q:"노년기 신체적 변화의 특성으로 올바른 것은?",opts:["노화는 한번 진행되면 되돌릴 수 없다.","나이가 들어도 면역 기능은 유지되거나 강화된다.","손상된 신체 기능은 빠르게 회복된다.","질병에 걸려도 치유 속도가 빠른 편이다.","일상적인 활동을 수행하는 능력이 높아진다."],ans:0},
  {q:"노년기에 나타나는 심리적 변화로 올바른 것은?",opts:["고집스러운 사고방식이 점차 줄어든다.","사교적이고 활발한 성향이 강해진다.","행동하기 전에 신중하게 따져보는 경향이 높아진다.","혼자서 해결하려는 독립적 성향이 강해진다.","슬픔이나 무기력감을 느끼는 빈도가 줄어든다."],ans:2},
  {q:"쌓아왔던 감정의 응어리를 풀어내고 죽음을 평화롭게 받아들이는 노인의 심리적 특성은?",opts:["내향성의 증가","조심성의 증가","유산을 남기려는 경향","생에 대한 회고의 경향","친근한 사물에 대한 애착심"],ans:3},
  {q:"인간관계가 단순해지고 고독감과 우울감이 높아지는 노인의 사회적 특성은?",opts:["역할상실","경제적 빈곤","유대감의 상실","내향성의 증가","사회적 관계회복"],ans:2},
  {q:"생애주기에서 노년기의 특성으로 올바른 것은?",opts:["사회적 참여와 활동이 더욱 활발해지는 시기이다.","노년기에는 단발적인 만남이 관계 형성에 더 중요하다.","여러 차례 만남을 거듭하면서 노인의 특성을 깊이 이해한다.","절망이란 자신이 살아온 삶과 모든 경험을 수용하는 것이다.","통합이란 자신의 과거와 현재를 부정적으로 바라보는 것이다."],ans:2},
  {q:"다음 사례에서 설명하는 가족 형태로 옳은 것은?\n\n노인 부모가 성인 자녀와 같은 건물이 아닌 인근 지역에 독립적으로 거주하면서, 필요한 경우 자녀로부터 돌봄을 받고 있다.",opts:["핵가족","조손가족","다문화가족","한부모가족","수정확대가족"],ans:4},
  {q:"노인 부양 문제를 해소하기 위한 올바른 방안은?",opts:["세대 간 분리를 통해 각자의 생활을 유지하는 것이 우선이다.","노인을 위한 돌봄 관련 정책을 더욱 확대·강화한다.","노인 일자리 지원 사업의 규모를 줄인다.","가정에서의 돌봄보다 시설 입소를 먼저 고려한다.","노인 부양의 책임을 장남이 단독으로 맡도록 한다."],ans:1},
  {q:"요양보호에서 가족의 역할에 대한 설명으로 옳은 것은?",opts:["배우자, 자녀, 이웃은 공식적 돌봄 인력에 해당한다.","요양보호사가 가족의 돌봄 역할을 완전히 대신할 수 있다.","집에서 생활하는 노인에게는 하루 종일 서비스 제공이 쉽다.","돌봄을 주고받는 노인과 돌보는 사람의 관계는 1차적 돌봄관계이다.","사회복지사, 간호사, 요양보호사는 비공식적 돌봄 인력이다."],ans:3},
  {q:"인간다운 케어에서 대상자를 대하는 실천 원칙으로 올바르게 연결된 것은?",opts:["만남 준비단계 - 대상자가 자리를 비운 경우 바로 업무를 진행한다.","케어 준비단계 - 대상자와 신뢰 관계를 형성하고 친밀감을 쌓는다.","지각 연결단계 - 서비스 제공자의 편의에 맞춰 요양서비스를 진행한다.","감정 고정단계 - 대상자에게 개선이 필요한 행동을 지적해 알려준다.","재회 약속단계 - 오늘로 요양보호서비스가 모두 종료됨을 안내한다."],ans:1},
  {q:"요양보호 실천의 4가지 원칙 중 올바른 것은?",opts:["대면하기 - 대상자를 위에서 내려다보거나 옆에서 흘깃 바라본다.","말하기 - 말을 하지 않는 대상자에게는 먼저 말을 걸지 않는다.","접촉하기 - 손가락 끝만 이용해 가볍게 접촉한다.","일어서게 하기 - 거동이 어려운 대상자는 반드시 부축해서 세운다.","말하기 - 말을 건넨 뒤에는 적어도 3초 이상 기다려준다."],ans:4},
  {q:"신체활동 지원 시 '대상자 중심 요양보호' 원칙을 올바르게 실천한 경우는?",opts:["\"지금 식사 시간입니다. 식사 도와드려도 될까요?\"","\"화장실을 오가는 게 번거로우시니 기저귀를 사용하시는 게 낫겠어요.\"","\"혼자 걸으시면 위험하니 제가 휠체어를 밀어드릴게요.\"","\"콧줄을 자꾸 빼내시니 어쩔 수 없이 억제대를 사용해야 할 것 같아요.\"","\"의자에서 일어나실 때는 겨드랑이를 잡고 세게 들어 올리면 돼요.\""],ans:0}
];

var questions=[], current=0, wrongIdx=[], isRetry=false, correctCount=0;

function show(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startQuiz(retryOnly){
  isRetry=retryOnly;
  questions=retryOnly ? wrongIdx.map(function(i){return ALL_QS[i];}) : ALL_QS.slice();
  current=0; wrongIdx=[]; correctCount=0;
  show('quiz');
  renderQ();
}

function renderQ(){
  var q=questions[current], total=questions.length;
  var nums=['①','②','③','④','⑤'];
  document.getElementById('prog').style.width=(Math.round(current/total*100))+'%';
  document.getElementById('counter').textContent=(current+1)+' / '+total;
  document.getElementById('liveScore').textContent='정답 '+correctCount+'개';
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('fb').className='feedback';
  document.getElementById('fb').textContent='';
  document.getElementById('nextbtn').className='btn-next';

  var c=document.getElementById('opts');
  c.innerHTML='';
  q.opts.forEach(function(o,i){
    var d=document.createElement('div');
    d.className='opt';
    d.setAttribute('role','button');
    d.setAttribute('tabindex','0');
    d.innerHTML='<span class="opt-num">'+nums[i]+'</span><span class="opt-text">'+o+'</span>';
    d.addEventListener('touchend', function(e){e.preventDefault(); pick(i);});
    d.addEventListener('click', function(e){pick(i);});
    c.appendChild(d);
  });
}

function pick(i){
  var q=questions[current];
  var opts=document.querySelectorAll('.opt');
  opts.forEach(function(o){o.removeEventListener('click',function(){});});
  opts.forEach(function(o,idx){
    o.classList.add('disabled');
    o.style.pointerEvents='none';
    if(idx===q.ans) o.classList.add('correct');
    else if(idx===i && i!==q.ans) o.classList.add('wrong');
    else if(idx!==q.ans) o.classList.add('dim');
  });

  var fb=document.getElementById('fb');
  var nb=document.getElementById('nextbtn');
  if(i===q.ans){
    fb.className='feedback ok show';
    fb.textContent='✓ 정답입니다!';
    correctCount++;
  } else {
    fb.className='feedback bad show';
    fb.textContent='✗ 오답! 정답은 '+ ['①','②','③','④','⑤'][q.ans]+' '+q.opts[q.ans];
    if(!isRetry){
      var orig=ALL_QS.indexOf(q);
      if(wrongIdx.indexOf(orig)===-1) wrongIdx.push(orig);
    }
  }
  nb.className='btn-next show';
  nb.textContent=current+1<questions.length ? '다음 문제 →' : '결과 보기 →';
}

function nextQ(){
  current++;
  if(current<questions.length) renderQ();
  else showResult();
}

function showResult(){
  show('result');
  var total=questions.length, correct=correctCount;
  var pct=Math.round(correct/total*100);
  document.getElementById('scoreNum').textContent=correct;
  document.getElementById('scoreDenom').textContent=' / '+total+'문제';
  document.getElementById('scorePct').textContent='정답률 '+pct+'%';
  var emoji='', msg='';
  if(pct===100){emoji='🏆';msg='완벽합니다! 모든 문제를 맞혔어요!';}
  else if(pct>=80){emoji='😊';msg='훌륭해요! 조금만 더 복습하면 완벽해요.';}
  else if(pct>=60){emoji='🙂';msg='절반 이상 맞혔어요. 틀린 문제를 다시 풀어보세요!';}
  else{emoji='💪';msg='더 많은 복습이 필요해요. 포기하지 마세요!';}
  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('scoreMsg').textContent=msg;

  var ws=document.getElementById('wrongSummary');
  var rw=document.getElementById('retryWrong');
  if(wrongIdx.length>0 && !isRetry){
    ws.innerHTML='<div class="wrong-summary">틀린 문제: '+wrongIdx.map(function(i){return 'Q'+(i+1);}).join(', ')+'<br>틀린 문제만 다시 풀어 완벽하게 마무리해보세요!</div>';
    rw.style.display='block';
  } else {
    ws.innerHTML='';
    rw.style.display='none';
  }
}

document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('startBtn').addEventListener('touchend', function(e){e.preventDefault();startQuiz(false);});
  document.getElementById('startBtn').addEventListener('click', function(){startQuiz(false);});
  document.getElementById('nextbtn').addEventListener('touchend', function(e){e.preventDefault();nextQ();});
  document.getElementById('nextbtn').addEventListener('click', function(){nextQ();});
  document.getElementById('retryWrong').addEventListener('touchend', function(e){e.preventDefault();startQuiz(true);});
  document.getElementById('retryWrong').addEventListener('click', function(){startQuiz(true);});
  document.getElementById('restartBtn').addEventListener('touchend', function(e){e.preventDefault();startQuiz(false);});
  document.getElementById('restartBtn').addEventListener('click', function(){startQuiz(false);});
});
</script>
</body>
</html>
